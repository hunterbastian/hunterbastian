<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#05070d" />
  <title>Starship</title>
  <meta name="description" content="A small controllable starship simulation — fly through deep space with inertia, thrusters, and a living starfield." />
  <link rel="icon" href="../assets/sky-farm-icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="space" aria-label="Starship flight simulation"></canvas>

  <header class="brand" aria-hidden="true">
    <p class="brand__mark">STARSHIP</p>
  </header>

  <div class="hud" id="hud" aria-live="polite">
    <div class="hud__block">
      <span class="hud__label">SPD</span>
      <span class="hud__value" id="hudSpeed">0</span>
    </div>
    <div class="hud__block">
      <span class="hud__label">HDG</span>
      <span class="hud__value" id="hudHeading">000°</span>
    </div>
    <div class="hud__block">
      <span class="hud__label">SHLD</span>
      <span class="hud__value" id="hudShield">100</span>
    </div>
    <div class="hud__block">
      <span class="hud__label">FUEL</span>
      <span class="hud__value" id="hudFuel">100</span>
    </div>
  </div>

  <aside class="panel" id="panel" aria-label="Flight controls">
    <button class="panel__toggle" id="panelToggle" aria-expanded="true" aria-controls="panelBody" title="Hide / show controls">
      <span class="panel__chevron"></span>
    </button>
    <div class="panel__body" id="panelBody">
      <p class="panel__title">flight deck</p>

      <div class="control">
        <label for="thrustRange">thrust</label>
        <input type="range" id="thrustRange" min="20" max="100" value="55" />
      </div>

      <div class="control">
        <label for="dragRange">drag</label>
        <input type="range" id="dragRange" min="0" max="40" value="8" />
      </div>

      <div class="control control--switch">
        <label for="assist">flight assist</label>
        <input type="checkbox" id="assist" checked />
      </div>

      <div class="control control--switch">
        <label for="trails">engine trails</label>
        <input type="checkbox" id="trails" checked />
      </div>

      <div class="panel__actions">
        <button class="btn" id="refuel">refuel &amp; repair</button>
        <button class="btn btn--ghost" id="reset">reset</button>
      </div>

      <p class="panel__hint" id="hint">WASD / arrows · space fire · shift boost</p>
    </div>
  </aside>

  <div class="touch" id="touch" aria-hidden="true">
    <div class="touch__stick" id="stick">
      <div class="touch__knob" id="knob"></div>
    </div>
    <div class="touch__buttons">
      <button class="touch__btn" id="fireBtn" type="button">FIRE</button>
      <button class="touch__btn touch__btn--boost" id="boostBtn" type="button">BOOST</button>
    </div>
  </div>

  <footer class="footer">
    <span>inertia flight · deep space</span>
  </footer>

  <div class="splash" id="splash">
    <p class="splash__brand">STARSHIP</p>
    <p class="splash__line">tap or press any key to launch</p>
  </div>

  <script src="starship.js" type="module"></script>
</body>
</html>
