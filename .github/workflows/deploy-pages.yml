name: Deploy Aria to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The GITHUB_TOKEN used by Actions cannot enable Pages for the first time —
  # that's a one-time repo-admin setting (Settings -> Pages -> Build and
  # deployment -> Source -> GitHub Actions). Check for it up front so this
  # workflow skips cleanly instead of failing until that's done.
  check:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check whether GitHub Pages is enabled
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages isn't enabled yet. Go to Settings > Pages > Build and deployment > Source > GitHub Actions, then re-run this workflow to publish Aria."
          fi

  deploy:
    needs: check
    if: needs.check.outputs.enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Aria as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: aria

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
